name: bliss_mobile
description: connecting people to global opportunities.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Core
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.2

  # Auth
  google_sign_in: ^6.2.1

  # Payments
  mpesa_flutter_plugin: ^1.6.1
  flutterwave_standard: ^1.1.0
  flutter_stripe: ^10.1.1

  # Media
  image_picker: ^1.2.1
  file_picker: ^10.3.7
  video_player: ^2.8.5
  chewie: ^1.8.0

  # UI / Utils
  intl: 0.17.0
  uuid: ^4.4.0
  font_awesome_flutter: ^10.7.0
  fl_chart: ^0.68.0
  fluttertoast: ^8.2.4
  url_launcher: ^6.3.0

  # Documents
  pdf: ^3.11.0
  printing: ^5.12.0

  # Security
  encrypt: ^5.0.3
  crypto: ^3.0.2

  # Realtime / Calls
  agora_rtc_engine: ^6.3.0
  permission_handler: ^11.3.1

  # Firebase / Backend
  # Firebase packages removed — using Render HTTP backend instead
  flutter_secure_storage: ^9.0.0
  http_parser: ^4.0.3
  cloud_firestore:
    path: packages/cloud_firestore
  firebase_auth:
    path: packages/firebase_auth
  firebase_core:
    path: packages/firebase_core
  firebase_storage:
    path: packages/firebase_storage
  cloud_firestore_web:
    path: packages/cloud_firestore_web
  firebase_auth_web:
    path: packages/firebase_auth_web
  firebase_core_web:
    path: packages/firebase_core_web
  firebase_storage_web:
    path: packages/firebase_storage_web
  _flutterfire_internals:
    path: packages/_flutterfire_internals

  # Routing
  go_router: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  cloud_firestore:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/cloud_firestore"
  firebase_auth:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/firebase_auth"
  firebase_core:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/firebase_core"
  firebase_storage:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/firebase_storage"
  cloud_firestore_web:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/cloud_firestore_web"
  firebase_auth_web:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/firebase_auth_web"
  firebase_core_web:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/firebase_core_web"
  firebase_storage_web:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/firebase_storage_web"
  _flutterfire_internals:
    path: "C:/Users/PC/Desktop/bliss software @/bliss_mobile/packages/_flutterfire_internals"

